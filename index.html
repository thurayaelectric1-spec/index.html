<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Points Account</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Points">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Tajawal',Tahoma,Arial,sans-serif;background:#0a0c14;color:white;display:flex;flex-direction:column;direction:rtl;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(120,80,255,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
body.light{background:#f0f4f8;color:#111;}
body.light .screen{background:#f0f4f8;}
body.light .setup-screen{background:#f0f4f8;}
body.light .team-setup-row{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);}
body.light .team-name-inp{color:#111;}
body.light .team-name-inp::placeholder{color:rgba(0,0,0,0.3);}
body.light .tc-btn{border-color:rgba(0,0,0,0.12);background:rgba(0,0,0,0.04);color:rgba(0,0,0,0.5);}
body.light .tc-btn.sel{border-color:#a855f7;background:rgba(168,85,247,0.12);color:#a855f7;}
body.light .tpreset{border-color:rgba(0,0,0,0.12);background:rgba(0,0,0,0.04);color:rgba(0,0,0,0.5);}
body.light .tpreset.sel{border-color:#a855f7;background:rgba(168,85,247,0.12);color:#a855f7;}
body.light .custom-inp{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.12);color:#111;}
body.light .game-header{border-bottom:1px solid rgba(0,0,0,0.08);}
body.light .game-title{color:rgba(0,0,0,0.6);}
body.light .gh-btn{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);color:rgba(0,0,0,0.5);}
body.light .sb-team{background:rgba(0,0,0,0.03)!important;}
body.light .prog-track{background:rgba(0,0,0,0.08);}
body.light .prog-pct{color:rgba(0,0,0,0.4);}
body.light .add-panel{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.08);}
body.light .add-panel-title{color:rgba(0,0,0,0.4);}
body.light .add-inp{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.12);color:#111;}
body.light .ctrl-btn{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.1);color:rgba(0,0,0,0.5);}
body.light .tabs{background:rgba(0,0,0,0.06);}
body.light .tab-btn{color:rgba(0,0,0,0.4);}
body.light .tab-btn.active{background:rgba(0,0,0,0.1);color:#111;}
body.light .tbl-wrap{border-color:rgba(0,0,0,0.1);}
body.light .tbl-head{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.08);}
body.light .tbl-head span{color:rgba(0,0,0,0.4);}
body.light .tbl-row{border-color:rgba(0,0,0,0.06);}
body.light .tbl-row:hover{background:rgba(0,0,0,0.04);}
body.light .tbl-rn{color:rgba(0,0,0,0.25);}
body.light .tbl-empty{color:rgba(0,0,0,0.25);}
body.light .hist-card{background:rgba(0,0,0,0.03);border-color:rgba(0,0,0,0.08);}
body.light .hist-card-header{border-color:rgba(0,0,0,0.06);}
body.light .hist-card-date{color:rgba(0,0,0,0.4);}
body.light .hist-score-item{background:rgba(0,0,0,0.04);}
body.light .hist-score-name{color:rgba(0,0,0,0.5);}
body.light .hist-empty{color:rgba(0,0,0,0.25);}
body.light .modal{background:#ffffff;border-color:rgba(0,0,0,0.15);}
body.light .modal-title{color:rgba(0,0,0,0.4);}
body.light .modal-inp{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.15);color:#111;}
body.light .mb-cancel{background:rgba(0,0,0,0.07);color:rgba(0,0,0,0.5);}
body.light .s-label{color:rgba(0,0,0,0.4);}
body.light .setup-sub{color:rgba(0,0,0,0.4);}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;background:#0a0c14;transition:opacity .3s,transform .3s;overflow-y:auto;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.97);}
.screen::-webkit-scrollbar{display:none;}
#setupScreen{align-items:center;justify-content:flex-start;padding:calc(30px + env(safe-area-inset-top,0px)) 20px calc(30px + env(safe-area-inset-bottom,0px));}
.setup-logo{font-size:42px;margin-bottom:6px;text-align:center;}
.setup-title{font-size:26px;font-weight:900;text-align:center;margin-bottom:3px;background:linear-gradient(135deg,#ff4d6d,#a855f7,#4cc9f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.setup-owner{display:inline-block;background:linear-gradient(135deg,#ff4d6d,#a855f7);border-radius:20px;padding:3px 14px;font-size:11px;font-weight:700;letter-spacing:2px;color:white;margin-bottom:24px;}
.s-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.38);letter-spacing:2px;margin-bottom:8px;}
.s-section{width:100%;margin-bottom:16px;}
.team-count-row{display:flex;gap:8px;}
.tc-btn{flex:1;padding:11px 6px;border-radius:11px;border:1.5px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all .18s;}
.tc-btn.sel{border-color:#a855f7;background:rgba(168,85,247,0.12);color:#a855f7;}
#teamSetupRows{display:flex;flex-direction:column;gap:10px;}
.team-setup-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 12px;}
.team-color-pick{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);cursor:pointer;flex-shrink:0;transition:transform .15s;}
.team-color-pick:active{transform:scale(.9);}
.team-name-inp{flex:1;background:transparent;border:none;color:white;font-family:inherit;font-size:15px;font-weight:700;outline:none;direction:rtl;}
.team-name-inp::placeholder{color:rgba(255,255,255,0.25);}
.color-popup{position:fixed;z-index:600;background:#1a1c2a;border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:12px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity .2s;}
.color-popup.show{opacity:1;pointer-events:all;}
.cp-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.cp-swatch:hover{transform:scale(1.15);border-color:white;}
.cp-swatch.active{border-color:white;transform:scale(1.1);}

.custom-inp{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:11px;padding:11px 14px;color:white;font-family:inherit;font-size:18px;font-weight:700;text-align:center;outline:none;direction:ltr;transition:border-color .2s;}
.custom-inp:focus{border-color:rgba(255,255,255,0.35);}
.btn-start{width:100%;padding:14px;border:none;border-radius:13px;background:linear-gradient(135deg,#ff4d6d,#a855f7,#4cc9f0);color:white;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer;letter-spacing:1px;transition:all .2s;margin-top:4px;}
.btn-start:active{transform:scale(.97);}
#gameScreen{padding:calc(10px + env(safe-area-inset-top,0px)) 10px calc(10px + env(safe-area-inset-bottom,0px));gap:0;}
.game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0;}
.game-title{font-size:15px;font-weight:900;color:rgba(255,255,255,0.6);}
.gh-btns{display:flex;gap:5px;}
.gh-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.45);padding:5px 9px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.gh-btn:hover{background:rgba(255,255,255,0.1);color:white;}
.gh-btn:disabled{opacity:.3;cursor:not-allowed;}
.scoreboard{display:flex;gap:5px;margin-bottom:7px;flex-shrink:0;}
.sb-team{flex:1;border-radius:12px;padding:10px 6px;text-align:center;border-top:3px solid;}
.sb-team-name{font-size:11px;font-weight:700;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-team-score{font-size:40px;font-weight:900;line-height:1;letter-spacing:-2px;}
.sb-team-rounds{font-size:9px;color:#e8a800;margin-top:3px;font-weight:700;}
.prog-section{margin-bottom:7px;flex-shrink:0;}
.prog-row-item{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.prog-name{font-size:10px;font-weight:700;width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;border-radius:10px;width:0%;transition:width .4s ease;}
.prog-pct{font-size:10px;color:rgba(255,255,255,0.3);width:26px;text-align:left;}
.add-panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px;margin-bottom:7px;flex-shrink:0;}
.add-panel-title{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-align:center;margin-bottom:8px;}
.add-inputs-grid{display:grid;gap:7px;margin-bottom:8px;}
.add-inp-group{display:flex;flex-direction:column;gap:3px;}
.add-inp-label{font-size:10px;font-weight:700;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.add-inp{width:100%;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 4px;color:white;font-family:inherit;font-size:18px;font-weight:900;text-align:center;outline:none;direction:ltr;transition:border-color .2s;}
.add-inp.err{border-color:#ff4d6d!important;}
.btn-add-all{width:100%;padding:11px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff4d6d,#a855f7,#4cc9f0);color:white;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;transition:all .18s;}
.btn-add-all:active{transform:scale(.98);}
.top-ctrl{display:flex;justify-content:center;gap:6px;margin-bottom:7px;flex-shrink:0;flex-wrap:wrap;}
.ctrl-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);padding:6px 11px;border-radius:7px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.ctrl-btn:hover{background:rgba(255,255,255,0.09);color:white;}
.tabs{display:flex;gap:0;margin-bottom:7px;background:rgba(255,255,255,0.04);border-radius:9px;padding:3px;flex-shrink:0;}
.tab-btn{flex:1;padding:6px;border:none;border-radius:7px;background:transparent;color:rgba(255,255,255,0.4);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:rgba(255,255,255,0.1);color:white;}
.tab-content{flex:1;overflow-y:auto;min-height:0;}
.tab-content::-webkit-scrollbar{width:2px;}
.tab-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}
.tbl-wrap{border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;}
.tbl-head{display:flex;padding:6px 9px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);}
.tbl-head span{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-align:center;flex:1;}
.tbl-head span:first-child{flex:0 0 22px;text-align:right;}
.tbl-head span:last-child{flex:0 0 18px;}
.tbl-row{display:flex;padding:7px 9px;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;cursor:pointer;transition:background .15s;}
.tbl-row:hover{background:rgba(255,255,255,0.04);}
.tbl-row:last-child{border-bottom:none;}
.tbl-rn{flex:0 0 22px;font-size:10px;color:rgba(255,255,255,0.2);font-weight:700;}
.tbl-rc{flex:1;text-align:center;font-size:12px;font-weight:700;}
.tbl-re{flex:0 0 18px;text-align:center;font-size:10px;opacity:0;transition:opacity .2s;}
.tbl-row:hover .tbl-re{opacity:1;}
.tbl-empty{text-align:center;color:rgba(255,255,255,0.15);font-size:12px;padding:20px 0;}
.win-mark{font-size:8px;background:#e8a800;color:#080b14;border-radius:3px;padding:1px 3px;margin-left:2px;font-weight:900;}
.hist-list{display:flex;flex-direction:column;gap:6px;}
.hist-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;}
.hist-card-header{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.05);}
.hist-card-title{font-size:12px;font-weight:700;}
.hist-card-date{font-size:10px;color:rgba(255,255,255,0.3);}
.hist-card-scores{display:flex;gap:5px;padding:7px 12px;}
.hist-score-item{flex:1;text-align:center;padding:5px;border-radius:7px;background:rgba(255,255,255,0.04);}
.hist-score-name{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:2px;}
.hist-score-val{font-size:15px;font-weight:900;}
.hist-score-item.winner{background:rgba(232,168,0,0.1);border:1px solid rgba(232,168,0,0.2);}
.hist-score-item.winner .hist-score-name{color:#e8a800;}
.hist-empty{text-align:center;color:rgba(255,255,255,0.15);font-size:12px;padding:20px 0;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.on{opacity:1;pointer-events:all;}
.modal{background:#12141f;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px 18px;width:90%;max-width:300px;transform:scale(.88);transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.overlay.on .modal{transform:scale(1);}
.modal-title{font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);text-align:center;letter-spacing:2px;margin-bottom:12px;}
.modal-field{margin-bottom:9px;}
.modal-lbl{font-size:10px;letter-spacing:1px;margin-bottom:4px;}
.modal-inp{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.12);border-radius:9px;padding:9px;color:white;font-family:inherit;font-size:20px;font-weight:700;text-align:center;outline:none;direction:ltr;}
.modal-btns{display:flex;gap:7px;margin-top:12px;}
.mbtn{flex:1;padding:10px;border:none;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.mbtn:active{transform:scale(.96);}
.mb-cancel{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);}
.mb-del{background:rgba(255,60,60,0.15);color:#ff6b6b;border:1px solid rgba(255,60,60,0.2);flex:.6;}
.mb-save{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;}
.cel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .3s;}
.cel-overlay.on{opacity:1;pointer-events:all;}
.cel-box{text-align:center;padding:36px 44px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);transform:scale(.8);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.cel-overlay.on .cel-box{transform:scale(1);}
.cel-icon{font-size:56px;display:block;margin-bottom:10px;}
.cel-sub{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:3px;margin-bottom:6px;}
.cel-name{font-size:36px;font-weight:900;margin-bottom:20px;}
.cel-cont{background:white;color:#080b14;border:none;padding:11px 28px;border-radius:11px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}

/* ── ANIMATIONS ── */
@keyframes scorePop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes rowSlideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{opacity:1}50%{opacity:0.6}}
.score-pop{animation:scorePop 0.35s cubic-bezier(.34,1.56,.64,1) both;}
.row-new{animation:rowSlideIn 0.3s ease both;}

/* ── CONFETTI ── */
#confettiCanvas{position:fixed;inset:0;z-index:999;pointer-events:none;}

/* ── TIMER ── */
.timer-bar{
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:7px 0;margin-bottom:7px;flex-shrink:0;
}
.timer-display{
  font-size:22px;font-weight:900;letter-spacing:2px;
  color:rgba(255,255,255,0.7);font-variant-numeric:tabular-nums;
}
body.light .timer-display{color:rgba(0,0,0,0.6);}
.timer-btn{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);padding:5px 12px;border-radius:8px;
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
}
body.light .timer-btn{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);color:rgba(0,0,0,0.5);}
.timer-btn:hover{background:rgba(255,255,255,0.12);color:white;}
.timer-btn.running{color:#4caf7d;border-color:rgba(76,175,125,0.3);}

/* ── SESSIONS SCREEN ── */
#sessionsScreen{align-items:stretch;padding:calc(20px + env(safe-area-inset-top,0px)) 16px calc(20px + env(safe-area-inset-bottom,0px));}
.sessions-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sessions-title{font-size:20px;font-weight:900;}
.sess-list{display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;}
.sess-card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  border-radius:13px;padding:14px 16px;cursor:pointer;transition:all .2s;
}
body.light .sess-card{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);}
.sess-card:hover{background:rgba(255,255,255,0.07);transform:translateY(-1px);}
.sess-card-name{font-size:15px;font-weight:800;margin-bottom:4px;}
.sess-card-info{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px;}
body.light .sess-card-info{color:rgba(0,0,0,0.4);}
.sess-card-teams{display:flex;gap:6px;flex-wrap:wrap;}
.sess-team-chip{
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
}
.sess-card-del{
  float:left;background:rgba(255,60,60,0.12);border:1px solid rgba(255,60,60,0.2);
  color:#ff6b6b;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:6px;
}
.btn-new-sess{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#ff4d6d,#a855f7,#4cc9f0);
  color:white;font-family:inherit;font-size:15px;font-weight:900;
  cursor:pointer;margin-top:10px;transition:all .2s;
}
.btn-new-sess:active{transform:scale(.97);}
.sess-empty{text-align:center;color:rgba(255,255,255,0.2);font-size:14px;padding:40px 0;}
body.light .sess-empty{color:rgba(0,0,0,0.2);}
</style>
</head>
<body>
<!-- Confetti Canvas -->
<canvas id="confettiCanvas"></canvas>

<!-- Sessions Screen -->
<div class="screen hidden" id="sessionsScreen">
  <div class="sessions-header">
    <div class="sessions-title">💾 الجلسات المحفوظة</div>
    <button class="gh-btn" id="sessCloseBtn">✕</button>
  </div>
  <div class="sess-list" id="sessList">
    <div class="sess-empty">لا توجد جلسات محفوظة بعد</div>
  </div>

<script>
(function(){
'use strict';
var PALETTE=['#ff4d6d','#ff8c42','#ffd60a','#4caf7d','#4cc9f0','#a855f7','#ec4899','#06b6d4','#f97316','#84cc16','#e879f9','#38bdf8','#fb7185','#34d399','#818cf8'];
var DCOLORS=['#ff4d6d','#4cc9f0','#4caf7d','#a855f7'];
var DNAMES=['الفريق الأول','الفريق الثاني','الفريق الثالث','الفريق الرابع'];
var SKEY='pa_v2';
var G={teams:[],rows:[],history:[],target:0,soundOn:true,lightMode:false,matchCount:0};
var TARGET=100,undoStack=[],editIdx=-1,selectedTarget=0,numTeams=2;

function saveG(){try{localStorage.setItem(SKEY,JSON.stringify(G));}catch(e){}}
function loadG(){try{var r=localStorage.getItem(SKEY);if(r){var p=JSON.parse(r);Object.keys(p).forEach(function(k){G[k]=p[k];});}}catch(e){}}
function el(id){return document.getElementById(id);}
function conv(s){return String(s).replace(/[٠-٩]/g,function(d){return d.charCodeAt(0)-1632;});}
function hasVal(v){return v!==null&&v!==undefined;}
function fmtDate(iso){
  try{
    var d=new Date(iso);
    var months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    var h=d.getHours(),m=d.getMinutes();
    return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear()+
      ' '+(h<10?'0'+h:h)+':'+(m<10?'0'+m:m);
  }catch(e){return '';}
}
function hexRgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}

/* ══ AUDIO ENGINE ══ */
var audioCtx=null;
function getCtx(){
  if(!audioCtx||audioCtx.state==='closed'){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function masterOut(ctx){
  var comp=ctx.createDynamicsCompressor();
  comp.threshold.value=-6;comp.knee.value=6;
  comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.15;
  comp.connect(ctx.destination);
  return comp;
}

function playSound(type){
  if(!G.soundOn)return;
  try{
    var ctx=getCtx(),out=masterOut(ctx),now=ctx.currentTime;

    if(type==='add'){
      /* coin-style: short high ping with metallic overtones */
      var freqs=[1046,1568,2093];
      freqs.forEach(function(f,i){
        var o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(0.28/(i+1),now+0.008);
        g.gain.exponentialRampToValueAtTime(0.001,now+0.22+i*0.04);
        o.connect(g);g.connect(out);
        o.start(now);o.stop(now+0.3);
      });
      /* click transient */
      var buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);
      var data=buf.getChannelData(0);
      for(var k=0;k<data.length;k++)data[k]=(Math.random()*2-1)*Math.pow(1-k/data.length,3);
      var src=ctx.createBufferSource(),ng=ctx.createGain();
      ng.gain.value=0.15;src.buffer=buf;src.connect(ng);ng.connect(out);src.start(now);

    }else if(type==='win'){
      /* epic fanfare: ascending chord + melody */
      var melody=[523,659,784,1047,1319];
      var harmony=[[523,659],[659,784],[784,988],[1047,1319]];
      melody.forEach(function(f,i){
        var t=now+i*0.13;
        /* main tone */
        var o1=ctx.createOscillator(),g1=ctx.createGain();
        o1.type='triangle';o1.frequency.value=f;
        g1.gain.setValueAtTime(0,t);
        g1.gain.linearRampToValueAtTime(0.4,t+0.02);
        g1.gain.setValueAtTime(0.4,t+0.15);
        g1.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        o1.connect(g1);g1.connect(out);o1.start(t);o1.stop(t+0.55);
        /* overtone */
        var o2=ctx.createOscillator(),g2=ctx.createGain();
        o2.type='sine';o2.frequency.value=f*2;
        g2.gain.setValueAtTime(0,t);
        g2.gain.linearRampToValueAtTime(0.15,t+0.02);
        g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        o2.connect(g2);g2.connect(out);o2.start(t);o2.stop(t+0.45);
      });
      /* bass punch at start */
      var ob=ctx.createOscillator(),gb=ctx.createGain();
      ob.type='sine';ob.frequency.setValueAtTime(130,now);
      ob.frequency.exponentialRampToValueAtTime(65,now+0.3);
      gb.gain.setValueAtTime(0.5,now);
      gb.gain.exponentialRampToValueAtTime(0.001,now+0.4);
      ob.connect(gb);gb.connect(out);ob.start(now);ob.stop(now+0.45);
      /* shimmer at end */
      [2093,2637,3136].forEach(function(f,i){
        var t=now+0.55;
        var os=ctx.createOscillator(),gs=ctx.createGain();
        os.type='sine';os.frequency.value=f;
        gs.gain.setValueAtTime(0,t);
        gs.gain.linearRampToValueAtTime(0.12,t+0.03);
        gs.gain.exponentialRampToValueAtTime(0.001,t+0.5+i*0.1);
        os.connect(gs);gs.connect(out);os.start(t);os.stop(t+0.65);
      });

    }else if(type==='undo'){
      /* descending sweep */
      var ou=ctx.createOscillator(),gu=ctx.createGain();
      ou.type='sine';
      ou.frequency.setValueAtTime(600,now);
      ou.frequency.exponentialRampToValueAtTime(250,now+0.2);
      gu.gain.setValueAtTime(0.25,now);
      gu.gain.exponentialRampToValueAtTime(0.001,now+0.22);
      ou.connect(gu);gu.connect(out);ou.start(now);ou.stop(now+0.25);
    }
  }catch(e){}
}



/* ══ CONFETTI ══ */
var confettiParticles=[],confettiRunning=false,confettiCtx=null;
function initConfetti(){
  var canvas=document.getElementById('confettiCanvas');if(!canvas)return;
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  confettiCtx=canvas.getContext('2d');
  window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
}
function launchConfetti(color){
  confettiParticles=[];confettiRunning=true;
  var colors=color?[color,'#ffd60a','#ffffff']:['#ff4d6d','#4cc9f0','#ffd60a','#a855f7','#4caf7d'];
  for(var i=0;i<130;i++){
    confettiParticles.push({x:Math.random()*window.innerWidth,y:-10,w:Math.random()*10+5,h:Math.random()*6+3,
      color:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-0.5)*6,vy:Math.random()*4+2,
      rot:Math.random()*360,rotV:(Math.random()-0.5)*8,life:1});
  }
  animConfetti();
}
function animConfetti(){
  if(!confettiCtx)return;
  var canvas=document.getElementById('confettiCanvas');
  confettiCtx.clearRect(0,0,canvas.width,canvas.height);
  confettiParticles=confettiParticles.filter(function(p){return p.life>0;});
  confettiParticles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.rot+=p.rotV;p.life-=0.008;
    confettiCtx.save();confettiCtx.globalAlpha=p.life;
    confettiCtx.translate(p.x,p.y);confettiCtx.rotate(p.rot*Math.PI/180);
    confettiCtx.fillStyle=p.color;confettiCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confettiCtx.restore();
  });
  if(confettiParticles.length>0)requestAnimationFrame(animConfetti);
  else confettiCtx.clearRect(0,0,canvas.width,canvas.height);
}

/* ══ TIMER ══ */
var timerSecs=0,timerOn=false,timerIv=null;
function timerTick(){timerSecs++;var h=Math.floor(timerSecs/3600),m=Math.floor((timerSecs%3600)/60),s=timerSecs%60;var td=el('timerDisplay');if(td)td.textContent=(h<10?'0'+h:h)+':'+(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);}
function toggleTimer(){var btn=el('timerBtn');if(timerOn){clearInterval(timerIv);timerOn=false;if(btn){btn.textContent='▶ ابدأ';btn.classList.remove('running');}}else{timerIv=setInterval(timerTick,1000);timerOn=true;if(btn){btn.textContent='⏸ وقفة';btn.classList.add('running');}}}
function resetTimer(){clearInterval(timerIv);timerOn=false;timerSecs=0;var td=el('timerDisplay');if(td)td.textContent='00:00:00';var btn=el('timerBtn');if(btn){btn.textContent='▶ ابدأ';btn.classList.remove('running');}}

/* ══ SESSIONS ══ */
var SKEYS='pa_sess_v1';
function loadSessions(){try{return JSON.parse(localStorage.getItem(SKEYS)||'[]');}catch(e){return[];}}
function saveSessions(ss){try{localStorage.setItem(SKEYS,JSON.stringify(ss));}catch(e){}}
function saveCurrentSession(){
  var name=prompt('اسم الجلسة:');if(!name||!name.trim())return;
  var ss=loadSessions();
  ss.unshift({id:Date.now(),name:name.trim(),date:new Date().toISOString(),target:TARGET,state:JSON.parse(JSON.stringify(G))});
  if(ss.length>20)ss=ss.slice(0,20);
  saveSessions(ss);renderSessionsList();alert('تم حفظ الجلسة ✅');
}
function loadSession(id){
  var ss=loadSessions(),sess=ss.find(function(s){return s.id===id;});if(!sess)return;
  if(!confirm('تحميل "'+sess.name+'"؟'))return;
  G=sess.state;TARGET=G.target||sess.target||100;saveG();
  hideSessionsScreen();el('setupScreen').classList.add('hidden');el('gameScreen').classList.remove('hidden');
  el('addInputsGrid').innerHTML='';renderGame();
}
function deleteSession(id){var ss=loadSessions();saveSessions(ss.filter(function(s){return s.id!==id;}));renderSessionsList();}
function renderSessionsList(){
  var c=el('sessList');if(!c)return;
  var ss=loadSessions();
  if(!ss.length){c.innerHTML='<div class="sess-empty">لا توجد جلسات محفوظة بعد</div>';return;}
  var html='';
  ss.forEach(function(s){
    var teams=s.state&&s.state.teams?s.state.teams:[];
    var chips=teams.map(function(t){return '<span class="sess-team-chip" style="background:'+hexRgba(t.color,0.15)+';color:'+t.color+'">'+t.name+'</span>';}).join('');
    var d=new Date(s.date);
    html+='<div class="sess-card" data-id="'+s.id+'"><div class="sess-card-name">'+s.name+'</div>'+
      '<div class="sess-card-info">'+d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear()+' · هدف '+s.target+'</div>'+
      '<div class="sess-card-teams">'+chips+'</div>'+
      '<button class="sess-card-del" data-del="'+s.id+'">🗑 حذف</button></div>';
  });
  c.innerHTML=html;
  c.querySelectorAll('.sess-card').forEach(function(card){
    card.addEventListener('click',function(e){if(e.target.getAttribute('data-del'))return;loadSession(parseInt(card.getAttribute('data-id'),10));});
  });
  c.querySelectorAll('.sess-card-del').forEach(function(btn){
    btn.addEventListener('click',function(e){e.stopPropagation();if(confirm('حذف؟'))deleteSession(parseInt(btn.getAttribute('data-del'),10));});
  });
}
function showSessionsScreen(){renderSessionsList();el('sessionsScreen').classList.remove('hidden');}
function hideSessionsScreen(){el('sessionsScreen').classList.add('hidden');}

/* ══ SCORE ANIMATION ══ */
function animScorePop(){document.querySelectorAll('.sb-team-score').forEach(function(e){e.classList.remove('score-pop');void e.offsetWidth;e.classList.add('score-pop');});}

function recalcCum(){
  var sums=G.teams.map(function(){return 0;});
  G.rows.forEach(function(row){
    G.teams.forEach(function(_,ti){if(hasVal(row.adds[ti]))sums[ti]+=row.adds[ti];});
    row.cums=sums.slice();
  });
  G.teams.forEach(function(t,ti){t.score=sums[ti];});
}

function pushUndo(){
  undoStack.push({rows:JSON.parse(JSON.stringify(G.rows)),scores:G.teams.map(function(t){return t.score;})});
  if(undoStack.length>30)undoStack.shift();
  el('undoBtn').disabled=false;
}
function undo(){
  if(!undoStack.length)return;
  var snap=undoStack.pop();
  G.rows=snap.rows;
  G.teams.forEach(function(t,i){t.score=snap.scores[i];});
  if(!undoStack.length)el('undoBtn').disabled=true;
  playSound('undo');saveG();renderGame();
}

function buildSetupRows(n){
  var cont=el('teamSetupRows');cont.innerHTML='';
  for(var i=0;i<n;i++){
    (function(idx){
      var color=(G.teams&&G.teams[idx])?G.teams[idx].color:DCOLORS[idx];
      var name=(G.teams&&G.teams[idx]&&G.teams[idx].name!==DNAMES[idx])?G.teams[idx].name:'';
      var row=document.createElement('div');row.className='team-setup-row';
      row.innerHTML='<div class="team-color-pick" id="cp'+idx+'" style="background:'+color+'"></div>'+
        '<input class="team-name-inp" id="tn'+idx+'" type="text" placeholder="'+DNAMES[idx]+'" value="'+name+'">';
      cont.appendChild(row);
      el('cp'+idx).addEventListener('click',function(e){e.stopPropagation();openColorPicker(idx,el('cp'+idx));});
    })(i);
  }
}

function openColorPicker(teamIdx,anchor){
  var popup=el('colorPopup');popup.innerHTML='';
  PALETTE.forEach(function(c){
    var s=document.createElement('div');s.className='cp-swatch';s.style.background=c;
    var cpEl=el('cp'+teamIdx);
    if(cpEl&&cpEl.style.background===c)s.classList.add('active');
    s.addEventListener('click',function(e){
      e.stopPropagation();
      var cp=el('cp'+teamIdx);if(cp)cp.style.background=c;
      popup.classList.remove('show');
    });
    popup.appendChild(s);
  });
  var rect=anchor.getBoundingClientRect();
  popup.style.top=(rect.bottom+6)+'px';
  popup.style.right=(window.innerWidth-rect.right)+'px';
  popup.classList.add('show');
}

function initSetup(){
  el('teamCountRow').querySelectorAll('.tc-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      el('teamCountRow').querySelectorAll('.tc-btn').forEach(function(b){b.classList.remove('sel');});
      btn.classList.add('sel');
      numTeams=parseInt(btn.getAttribute('data-n'),10);
      buildSetupRows(numTeams);
    });
  });

  el('startBtn').addEventListener('click',startGame);
  el('customTarget').addEventListener('keydown',function(e){if(e.key==='Enter')startGame();});
  document.addEventListener('click',function(){el('colorPopup').classList.remove('show');});
  buildSetupRows(2);
}

function showSetup(){
  el('setupScreen').classList.remove('hidden');
  el('gameScreen').classList.add('hidden');
  numTeams=G.teams.length||2;
  el('teamCountRow').querySelectorAll('.tc-btn').forEach(function(b){
    b.classList.toggle('sel',parseInt(b.getAttribute('data-n'),10)===numTeams);
  });
  el('customTarget').value=TARGET||2000;
  buildSetupRows(numTeams);
}

function startGame(){
  var teams=[];
  for(var i=0;i<numTeams;i++){
    var cpEl=el('cp'+i),tnEl=el('tn'+i);
    var color=cpEl?cpEl.style.background:DCOLORS[i];
    var name=tnEl&&tnEl.value.trim()?tnEl.value.trim():DNAMES[i];
    var oldRounds=(G.teams&&G.teams[i])?G.teams[i].rounds||0:0;
    teams.push({name:name,color:color,score:0,rounds:oldRounds});
  }
  var cv=parseInt(conv(el('customTarget').value),10);
  if(!isNaN(cv)&&cv>0){TARGET=cv;}
  else{el('customTarget').style.borderColor='#ff4d6d';setTimeout(function(){el('customTarget').style.borderColor='';},700);return;}
  G.teams=teams;G.target=TARGET;G.rows=[];undoStack=[];
  saveG();
  el('setupScreen').classList.add('hidden');
  el('gameScreen').classList.remove('hidden');
  el('undoBtn').disabled=true;
  renderGame();
}

function renderGame(){
  TARGET=G.target||TARGET;
  renderScoreboard();renderProgress();renderAddInputs();renderTable();renderHistory();
  document.body.classList.toggle('light',G.lightMode||false);
  el('themeBtn').textContent=(G.lightMode)?'🌙':'☀️';
  el('soundBtn').textContent=G.soundOn?'🔊':'🔇';
}

function renderScoreboard(){
  var sb=el('scoreboard');sb.innerHTML='';
  G.teams.forEach(function(t){
    var d=document.createElement('div');d.className='sb-team';
    d.style.borderTopColor=t.color;d.style.background=hexRgba(t.color,0.07);
    d.innerHTML='<div class="sb-team-name" style="color:'+t.color+'">'+t.name+'</div>'+
      '<div class="sb-team-score" style="color:'+t.color+'">'+t.score+'</div>'+
      '<div class="sb-team-rounds">🏆 '+t.rounds+' شوط</div>';
    sb.appendChild(d);
  });
}

function renderProgress(){
  var ps=el('progSection');ps.innerHTML='';
  G.teams.forEach(function(t){
    var pct=Math.min(Math.round(t.score/TARGET*100),100);
    var r=document.createElement('div');r.className='prog-row-item';
    r.innerHTML='<div class="prog-name" style="color:'+t.color+'">'+t.name+'</div>'+
      '<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%;background:'+t.color+'"></div></div>'+
      '<div class="prog-pct">'+pct+'%</div>';
    ps.appendChild(r);
  });
}

function renderAddInputs(){
  var grid=el('addInputsGrid');
  var cols=G.teams.length<=2?2:G.teams.length<=3?3:4;
  grid.style.gridTemplateColumns='repeat('+cols+',1fr)';
  grid.innerHTML='';
  G.teams.forEach(function(t,i){
    var grp=document.createElement('div');grp.className='add-inp-group';
    grp.innerHTML='<div class="add-inp-label" style="color:'+t.color+'">'+t.name+'</div>'+
      '<input class="add-inp" id="ai'+i+'" type="text" inputmode="numeric" placeholder="">';
    grid.appendChild(grp);
    var inp=el('ai'+i);
    inp.addEventListener('focus',function(){this.style.borderColor=t.color;});
    inp.addEventListener('blur',function(){this.style.borderColor=hexRgba(t.color,0.25);});
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter'){
        if(i<G.teams.length-1){var nx=el('ai'+(i+1));if(nx)nx.focus();}
        else addAll();
      }
    });
  });
}

function addAll(){
  var vals=[],err=false,allEmpty=true;
  G.teams.forEach(function(_,i){
    var inp=el('ai'+i);
    var raw=conv(inp?inp.value:'');
    var v=raw.trim()===''?null:parseInt(raw,10);
    if(v!==null&&isNaN(v)){if(inp)inp.classList.add('err');err=true;}
    else if(v!==null)allEmpty=false;
    vals.push(v);
  });
  if(err){setTimeout(function(){G.teams.forEach(function(_,i){var inp=el('ai'+i);if(inp)inp.classList.remove('err');});},700);return;}
  if(allEmpty){
    G.teams.forEach(function(_,i){var inp=el('ai'+i);if(inp){inp.classList.add('err');}});
    setTimeout(function(){G.teams.forEach(function(_,i){var inp=el('ai'+i);if(inp)inp.classList.remove('err');});},700);return;
  }
  // If all values are null (no input at all) don't add row
  var hasAnyValue=vals.some(function(v){return v!==null;});
  if(!hasAnyValue)return;
  pushUndo();
  G.rows.push({r:G.rows.length+1,adds:vals,cums:G.teams.map(function(){return 0;}),won:null});
  recalcCum();
  G.teams.forEach(function(_,i){var inp=el('ai'+i);if(inp)inp.value='';});
  var f=el('ai0');if(f)f.focus();
  animScorePop();playSound('add');checkWin();saveG();renderGame();
}

function checkWin(){
  // Find all teams that reached or passed TARGET
  var winners=[];
  G.teams.forEach(function(t,i){if(t.score>=TARGET)winners.push(i);});
  if(!winners.length)return;

  if(winners.length===1){
    // One winner
    declareWinner(winners[0]);
  } else {
    // Multiple teams reached TARGET — find highest score
    var maxScore=Math.max.apply(null,winners.map(function(i){return G.teams[i].score;}));
    var topWinners=winners.filter(function(i){return G.teams[i].score===maxScore;});
    if(topWinners.length===1){
      // One team has highest — wins
      declareWinner(topWinners[0]);
    } else {
      // Exact tie — show tie message, play round continues
      showTie(topWinners);
    }
  }
}

function declareWinner(i){
  var lr=G.rows[G.rows.length-1];if(lr)lr.won=i;
  G.teams[i].rounds++;
  G.matchCount=(G.matchCount||0)+1;
  G.history.unshift({date:new Date().toISOString(),target:TARGET,matchNum:G.matchCount,winner:i,
    teams:G.teams.map(function(t){return {name:t.name,color:t.color,score:t.score};})});
  playSound('win');
  launchConfetti(G.teams[i].color);
  showCel(G.teams[i].name,G.teams[i].color);
  G.teams.forEach(function(t){t.score=0;});G.rows=[];undoStack=[];el('undoBtn').disabled=true;
}

function showTie(tiedIdx){
  // Show tie overlay
  var names=tiedIdx.map(function(i){return G.teams[i].name;}).join(' و ');
  var score=G.teams[tiedIdx[0]].score;
  el('celName').textContent=names;
  el('celName').style.color='#ffd60a';
  el('celOverlay').querySelector('.cel-icon').textContent='🤝';
  el('celOverlay').querySelector('.cel-sub').textContent='تعادل بـ '+score+' نقطة — جولة إضافية!';
  el('celOverlay').querySelector('.cel-cont').textContent='استمر في اللعب';
  el('celOverlay').classList.add('on');
  // Don't reset scores — continue playing
  saveG();renderGame();
}

function renderTable(){
  var head=el('tblHead');
  head.innerHTML='<span>#</span>';
  G.teams.forEach(function(t){head.innerHTML+='<span style="color:'+t.color+'">'+t.name.substring(0,5)+'</span>';});
  head.innerHTML+='<span></span>';
  var body=el('tblBody');
  if(!G.rows.length){body.innerHTML='<div class="tbl-empty">لا توجد جولات — أضف نقاط للبدء</div>';return;}
  var html='';
  var rev=G.rows.slice().reverse();
  for(var ri=0;ri<rev.length;ri++){
    var row=rev[ri],idx=G.rows.length-1-ri;
    html+='<div class="tbl-row'+(ri===0?' row-new':'')+'" data-idx="'+idx+'"><div class="tbl-rn">'+row.r+'</div>';
    G.teams.forEach(function(t,ti){
      var add=hasVal(row.adds[ti])?row.adds[ti]:null;
      var cum=row.cums[ti],isWon=row.won===ti;
      var aStr=add!==null?'<span style="color:'+t.color+'">'+add+'</span>':'<span style="color:rgba(255,255,255,0.15)">—</span>';
      var wB=isWon?'<span class="win-mark">✓</span>':'';
      html+='<div class="tbl-rc">'+aStr+'<br><span style="color:'+hexRgba(t.color,0.6)+';font-size:10px">'+wB+cum+'</span></div>';
    });
    html+='<div class="tbl-re">✏️</div></div>';
  }
  body.innerHTML=html;
  body.querySelectorAll('.tbl-row').forEach(function(r){
    r.addEventListener('click',function(){openEdit(parseInt(this.getAttribute('data-idx'),10));});
  });
}

function renderHistory(){
  var c=el('histList');
  if(!G.history||!G.history.length){c.innerHTML='<div class="hist-empty">لا توجد مباريات سابقة</div>';return;}
  var html='';
  G.history.forEach(function(h){
    html+='<div class="hist-card"><div class="hist-card-header">'+
      '<div class="hist-card-title">🏆 '+h.teams[h.winner].name+' فاز — هدف '+h.target+'</div>'+
      '<div class="hist-card-date">'+fmtDate(h.date)+'</div></div><div class="hist-card-scores">';
    h.teams.forEach(function(t,ti){
      var isW=ti===h.winner;
      html+='<div class="hist-score-item'+(isW?' winner':'')+'">'+
        '<div class="hist-score-name" style="color:'+(isW?'#e8a800':t.color)+'">'+t.name+'</div>'+
        '<div class="hist-score-val" style="color:'+t.color+'">'+t.score+'</div></div>';
    });
    html+='</div></div>';
  });
  c.innerHTML=html;
}

function openEdit(idx){
  editIdx=idx;var row=G.rows[idx];var fields=el('editFields');fields.innerHTML='';
  G.teams.forEach(function(t,ti){
    var f=document.createElement('div');f.className='modal-field';
    f.innerHTML='<div class="modal-lbl" style="color:'+t.color+'">'+t.name+'</div>'+
      '<input class="modal-inp" id="mei'+ti+'" type="text" inputmode="numeric">';
    fields.appendChild(f);
    el('mei'+ti).value=hasVal(row.adds[ti])?row.adds[ti]:'';
  });
  el('editOverlay').classList.add('on');
  var f=el('mei0');if(f)f.focus();
}
function closeEdit(){el('editOverlay').classList.remove('on');editIdx=-1;}
function saveEdit(){
  if(editIdx<0)return;
  var row=G.rows[editIdx],newAdds=[],err=false;
  G.teams.forEach(function(_,ti){
    var inp=el('mei'+ti);var raw=inp?conv(inp.value.trim()):'';
    var v=raw===''?null:parseInt(raw,10);
    if(v!==null&&isNaN(v))err=true;
    newAdds.push(v);
  });
  if(err)return;
  pushUndo();row.adds=newAdds;recalcCum();closeEdit();saveG();renderGame();
}
function deleteRow(){
  if(editIdx<0)return;if(!confirm('حذف هذه الجولة؟'))return;
  pushUndo();G.rows.splice(editIdx,1);G.rows.forEach(function(r,i){r.r=i+1;});
  recalcCum();closeEdit();saveG();renderGame();
}

function showCel(name,color){
  el('celName').textContent=name;el('celName').style.color=color;
  el('celOverlay').classList.add('on');
}
function closeCel(){
  el('celOverlay').classList.remove('on');
  // Restore default cel text
  el('celOverlay').querySelector('.cel-icon').textContent='🏆';
  el('celOverlay').querySelector('.cel-sub').textContent='فاز بالشوط';
  el('celOverlay').querySelector('.cel-cont').textContent='متابعة اللعب';
  renderGame();
}

function initTabs(){
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
      btn.classList.add('active');
      var tab=el('tab-'+btn.getAttribute('data-tab'));if(tab)tab.classList.add('active');
    });
  });
}

function bindEvents(){
  el('addAllBtn').addEventListener('click',addAll);
  el('undoBtn').addEventListener('click',undo);
  el('resetRoundBtn').addEventListener('click',function(){if(!confirm('إعادة الشوط؟'))return;G.teams.forEach(function(t){t.score=0;});G.rows=[];undoStack=[];el('undoBtn').disabled=true;saveG();renderGame();});
  el('resetAllBtn').addEventListener('click',function(){if(!confirm('إعادة كاملة؟'))return;G.teams.forEach(function(t){t.score=0;t.rounds=0;});G.rows=[];undoStack=[];el('undoBtn').disabled=true;saveG();renderGame();});
  el('newGameBtn').addEventListener('click',showSetup);
  el('mCancel').addEventListener('click',closeEdit);
  el('mDel').addEventListener('click',deleteRow);
  el('mSave').addEventListener('click',saveEdit);
  el('celCont').addEventListener('click',closeCel);
  el('themeBtn').addEventListener('click',function(){G.lightMode=!G.lightMode;saveG();renderGame();});
  el('soundBtn').addEventListener('click',function(){G.soundOn=!G.soundOn;saveG();renderGame();});
  el('editOverlay').addEventListener('click',function(e){if(e.target===el('editOverlay'))closeEdit();});
  var tbtn=el('timerBtn');if(tbtn)tbtn.addEventListener('click',toggleTimer);
  var trst=el('timerReset');if(trst)trst.addEventListener('click',resetTimer);
  var sbtn=el('sessBtn');if(sbtn)sbtn.addEventListener('click',showSessionsScreen);
  var sclose=el('sessCloseBtn');if(sclose)sclose.addEventListener('click',hideSessionsScreen);
  var snew=el('newSessBtn');if(snew)snew.addEventListener('click',saveCurrentSession);
}

loadG();initSetup();initTabs();bindEvents();initConfetti();
if(G.teams&&G.teams.length&&G.target){
  TARGET=G.target;
  el('setupScreen').classList.add('hidden');
  el('gameScreen').classList.remove('hidden');
  renderGame();
}else{
  buildSetupRows(2);
}
}());
</script>
